<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>24-Week Transformation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
img{max-width:100%;display:block}

/* ── Variables ── */
:root{
  --bg:          #0a0a0a;
  --surface:     #111111;
  --surface2:    #1a1a1a;
  --border:      #1e1e1e;
  --text:        #f5f5f5;
  --text2:       #a0a0a0;
  --text3:       #555555;
  --accent:      #ffffff;
  --accent2:     #888888;
  --green:       #22c55e;
  --red:         #ef4444;
  --radius:      12px;
  --radius-sm:   8px;
  --shadow:      0 1px 3px rgba(0,0,0,0.4);
  --font:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-heading:'Barlow Condensed', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── Base ── */
html{font-size:16px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  max-width:430px; margin:0 auto; min-height:100vh;
  padding-bottom:calc(72px + var(--safe-bottom));
  user-select:none; -webkit-tap-highlight-color:transparent;
}

/* ── Top Bar ── */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 20px 8px;
}
.topbar h1{
  font-family:var(--font-heading);
  font-weight:800; font-size:20px; letter-spacing:-0.3px;
  color:var(--text);
}
.topbar .meta{
  font-size:11px; color:var(--text3); letter-spacing:0.5px;
  text-transform:uppercase; font-weight:500; margin-top:1px;
}
.topbar .badge{
  font-size:11px; font-weight:600; color:var(--text);
  background:var(--border); padding:4px 10px; border-radius:6px;
  letter-spacing:0.3px;
}

/* ── Section Title ── */
.section-title{
  display:flex; justify-content:space-between; align-items:baseline;
  padding:0 20px; margin:20px 0 8px;
}
.section-title h2{
  font-family:var(--font-heading);
  font-size:15px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--text2);
}
.section-title .sub{
  font-size:12px; color:var(--text3); font-weight:500;
}

/* ── Cards ── */
.card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px 18px;
  margin:0 16px 8px;
}

/* ── Meal Item ── */
.meal-item{
  display:flex; align-items:center; gap:12px;
  padding:14px 0; border-bottom:1px solid var(--border);
  cursor:pointer;
}
.meal-item:last-child{border-bottom:none; padding-bottom:0;}
.meal-item:first-child{padding-top:0;}

.meal-dot{
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  background:var(--text3); transition:all 0.2s;
}
.meal-item.done .meal-dot{background:var(--green)}

.meal-info{flex:1; min-width:0}
.meal-info .name{
  font-size:14px; font-weight:600; color:var(--text);
  line-height:1.3;
}
.meal-info .meta{
  font-size:12px; color:var(--text3); margin-top:2px;
}

.meal-check{
  width:22px; height:22px; border-radius:50%;
  border:1.5px solid var(--text3); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; font-size:11px; color:transparent;
}
.meal-item.done .meal-check{
  border-color:var(--green); background:var(--green); color:#000;
}

/* Recipe expandable */
.recipe-wrap{
  max-height:0; overflow:hidden; transition:max-height 0.35s ease;
  background:var(--surface2); border-radius:var(--radius-sm);
  margin-top:0;
}
.recipe-wrap.open{max-height:600px; margin-top:10px; padding:14px;}
.recipe-wrap h4{
  font-family:var(--font-heading); font-size:13px;
  text-transform:uppercase; letter-spacing:1px;
  color:var(--text2); margin-bottom:6px;
}
.recipe-wrap ul{padding-left:16px; list-style:disc}
.recipe-wrap li{
  font-size:12px; color:var(--text2); line-height:1.6;
  margin-bottom:2px;
}
.recipe-wrap .tip{
  font-size:11px; color:var(--accent2); margin-top:8px;
  font-style:italic;
}

/* ── Stats Row ── */
.stats-row{
  display:grid; grid-template-columns:repeat(4,1fr); gap:6px;
  margin:0 16px 8px;
}
.stat-box{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 6px;
  text-align:center;
}
.stat-box .num{
  font-family:var(--font-heading); font-size:22px; font-weight:700;
  color:var(--text); line-height:1.1;
}
.stat-box .label{
  font-size:9px; color:var(--text3); text-transform:uppercase;
  letter-spacing:0.8px; margin-top:3px; font-weight:500;
}
.stat-box .num.green{color:var(--green)}
.stat-box .num.accent{color:var(--accent2)}

/* ── Water Grid ── */
.water-row{display:flex; gap:6px; padding:10px 0 0; flex-wrap:wrap}
.water-cup{
  width:38px; height:38px; border-radius:6px;
  border:1.5px solid var(--border); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--text3); cursor:pointer;
  transition:all 0.2s;
}
.water-cup.done{
  border-color:var(--green); background:rgba(34,197,94,0.08);
  color:var(--green);
}
.water-label{font-size:11px; color:var(--text3); margin-top:6px}

/* ── Workout ── */
.workout-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px;
  margin:0 16px 6px;
}
.workout-card h3{
  font-family:var(--font-heading); font-size:13px;
  text-transform:uppercase; letter-spacing:1.5px;
  color:var(--text2); margin-bottom:8px;
}
.workout-ex{
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 0; border-bottom:1px solid var(--border);
  font-size:13px; line-height:1.3;
}
.workout-ex:last-child{border-bottom:none}
.workout-ex .ex-name{color:var(--text); font-weight:500}
.workout-ex .ex-reps{color:var(--text3); font-size:12px}
.workout-ex .ex-ck{
  width:20px; height:20px; border-radius:4px;
  border:1.5px solid var(--text3); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.2s; font-size:10px; color:transparent;
}
.workout-ex.done .ex-ck{
  border-color:var(--green); background:var(--green); color:#000;
}

/* ── Tabs ── */
.tabbar{
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(10,10,10,0.92); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex; justify-content:space-around; padding:8px 0 calc(8px + var(--safe-bottom));
  max-width:430px; margin:0 auto; z-index:100;
}
.tab-btn{
  border:none; background:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:4px 12px; min-width:0;
}
.tab-btn .icon{
  width:22px; height:22px; display:flex; align-items:center; justify-content:center;
  font-size:14px; transition:all 0.2s;
}
.tab-btn .lbl{
  font-size:9px; text-transform:uppercase; letter-spacing:0.8px;
  font-weight:600; color:var(--text3); transition:color 0.2s;
}
.tab-btn.active .icon{color:var(--text)}
.tab-btn.active .lbl{color:var(--text)}

/* ── Tab Content ── */
.tab-pane{display:none; animation:fadeIn 0.2s ease}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)}}

/* ── Day Selector ── */
.day-strip{
  display:flex; gap:4px; margin:0 16px 10px; overflow-x:auto;
  scrollbar-width:none; -ms-overflow-style:none;
}
.day-strip::-webkit-scrollbar{display:none}
.day-strip .day-pill{
  padding:6px 12px; border-radius:6px; border:1px solid var(--border);
  font-size:11px; font-weight:600; color:var(--text3);
  cursor:pointer; white-space:nowrap; background:var(--surface);
  transition:all 0.15s;
}
.day-strip .day-pill.active{background:var(--text); color:var(--bg); border-color:var(--text)}
.day-strip .day-pill.today{color:var(--text2); border-color:var(--text2)}

/* ── Weight Input ── */
.w-input{display:flex; gap:8px; margin-bottom:12px}
.w-input input{
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 12px;
  color:var(--text); font-size:16px; font-weight:600; outline:none;
  font-family:var(--font);
}
.w-input input:focus{border-color:var(--text)}
.w-input input::placeholder{color:var(--text3); font-weight:400}
.w-input button{
  background:var(--text); color:var(--bg); border:none;
  border-radius:var(--radius-sm); padding:10px 16px;
  font-weight:700; font-size:13px; cursor:pointer;
  font-family:var(--font);
}

.entry-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid var(--border);
  font-size:13px;
}
.entry-row:last-child{border-bottom:none}
.entry-row .d{color:var(--text3)}
.entry-row .v{font-weight:600; color:var(--text)}
.entry-row .diff{margin-left:6px; font-size:12px; font-weight:600}
.entry-row .diff.down{color:var(--green)}
.entry-row .diff.up{color:var(--red)}

/* ── Recipe Filter ── */
.filter-strip{
  display:flex; gap:4px; margin:0 16px 10px; overflow-x:auto;
  scrollbar-width:none;
}
.filter-strip::-webkit-scrollbar{display:none}
.filter-strip .flt{
  padding:6px 12px; border-radius:6px; border:1px solid var(--border);
  font-size:11px; font-weight:600; color:var(--text3);
  cursor:pointer; white-space:nowrap; background:var(--surface);
  transition:all 0.15s;
}
.filter-strip .flt.active{background:var(--text); color:var(--bg); border-color:var(--text)}

/* Recipe cards in tab */
.r-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px; margin:0 16px 8px;
  cursor:pointer; transition:all 0.15s;
}
.r-card:active{background:var(--surface2)}
.r-card .top{
  display:flex; justify-content:space-between; align-items:flex-start;
}
.r-card h4{font-size:14px; font-weight:600; color:var(--text)}
.r-card .tags{
  display:flex; gap:4px; margin-top:4px; flex-wrap:wrap;
}
.r-card .tag{
  font-size:10px; padding:2px 8px; border-radius:4px;
  background:var(--surface2); color:var(--text3); font-weight:500;
  border:1px solid var(--border);
}
.r-card .arrow{font-size:16px; color:var(--text3); margin-left:8px; flex-shrink:0}
.r-card .detail{
  max-height:0; overflow:hidden; transition:max-height 0.3s;
}
.r-card.open .detail{max-height:600px; padding-top:12px}
.r-card .detail h5{
  font-size:11px; text-transform:uppercase; letter-spacing:1px;
  color:var(--text2); margin-bottom:6px; font-weight:600;
}
.r-card .detail ul{padding-left:16px; list-style:disc}
.r-card .detail li{font-size:12px; color:var(--text2); line-height:1.5; margin-bottom:3px}
.r-card .detail .tip{
  font-size:11px; color:var(--accent2); margin-top:8px; font-style:italic;
}

/* ── Workout Tab ── */
.notes-ta{
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 12px;
  color:var(--text); font-size:13px; min-height:60px; resize:vertical;
  font-family:var(--font); outline:none;
}
.notes-ta:focus{border-color:var(--text2)}
.notes-ta::placeholder{color:var(--text3)}

/* ── Misc ── */
.empty-state{
  padding:24px; text-align:center; font-size:13px; color:var(--text3);
  background:var(--surface); border-radius:var(--radius);
  margin:0 16px; border:1px solid var(--border);
}
.center{text-align:center}

.bot-space{height:20px}
</style>
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div class="topbar">
  <div>
    <h1>Transformation</h1>
    <div class="meta">Phase <span id="phaseNum">1</span> &middot; Week <span id="weekNum">1</span></div>
  </div>
  <div class="badge" id="dayBadge">Day 1</div>
</div>

<!-- ═══ TABS ═══ -->
<div class="tab-pane active" id="pane-today">
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="num" id="sStart">102</div><div class="label">Start</div></div>
    <div class="stat-box"><div class="num" id="sCurrent">102</div><div class="label">Current</div></div>
    <div class="stat-box"><div class="num green" id="sLost">0</div><div class="label">Lost</div></div>
    <div class="stat-box"><div class="num accent" id="sTarget">80</div><div class="label">Target</div></div>
  </div>

  <!-- Meals -->
  <div class="section-title"><h2>Today's Meals</h2><div class="sub"><span id="calEaten">0</span>/<span id="calTarget">1500</span></div></div>
  <div class="card" id="mealsContainer"></div>

  <!-- Water -->
  <div class="section-title"><h2>Water</h2><div class="sub"><span id="waterCount">0</span>/8 cups</div></div>
  <div class="card">
    <div class="water-row" id="waterGrid"></div>
  </div>

  <!-- Workout Today -->
  <div class="section-title"><h2>Today's Workout</h2></div>
  <div id="todayWorkout"></div>
</div>

<div class="tab-pane" id="pane-workout">
  <div class="section-title"><h2>Workout</h2><div class="sub" id="workoutDayLabel">Monday</div></div>
  <div class="day-strip" id="dayStrip"></div>
  <div id="workoutDetail"></div>
  <div class="section-title"><h2>Notes</h2></div>
  <div class="card">
    <textarea class="notes-ta" id="workoutNotes" placeholder="How did it feel? What weights?"></textarea>
  </div>
</div>

<div class="tab-pane" id="pane-progress">
  <div class="section-title"><h2>Weight Log</h2></div>
  <div class="card">
    <div class="w-input">
      <input type="number" id="weightInput" placeholder="kg" step="0.1">
      <button onclick="logWeight()">Log</button>
    </div>
    <div id="weightLog"></div>
  </div>
  <div class="section-title"><h2>Weekly Check</h2></div>
  <div class="card">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span class="tag" style="pointer-events:none">1,500 cal</span>
      <span class="tag" style="pointer-events:none">180g protein</span>
      <span class="tag" style="pointer-events:none">10K steps</span>
      <span class="tag" style="pointer-events:none">8hr sleep</span>
      <span class="tag" style="pointer-events:none">Progress photo</span>
    </div>
  </div>
</div>

<div class="tab-pane" id="pane-recipes">
  <div class="section-title"><h2>Recipes</h2></div>
  <div class="filter-strip" id="recipeFilter">
    <span class="flt active" data-f="all">All</span>
    <span class="flt" data-f="breakfast">Breakfast</span>
    <span class="flt" data-f="lunch">Lunch</span>
    <span class="flt" data-f="snack">Snack</span>
    <span class="flt" data-f="dinner">Dinner</span>
  </div>
  <div id="recipeList"></div>
</div>

<!-- ═══ TAB BAR ═══ -->
<div class="tabbar">
  <button class="tab-btn active" data-tab="today">
    <span class="icon">&#x25CB;</span>
    <span class="lbl">Today</span>
  </button>
  <button class="tab-btn" data-tab="workout">
    <span class="icon">&#x25B3;</span>
    <span class="lbl">Workout</span>
  </button>
  <button class="tab-btn" data-tab="progress">
    <span class="icon">&#x2261;</span>
    <span class="lbl">Progress</span>
  </button>
  <button class="tab-btn" data-tab="recipes">
    <span class="icon">&#x2713;</span>
    <span class="lbl">Recipes</span>
  </button>
</div>

<div class="bot-space"></div>

<script>
// ═══ DATA ═══
const PHASE = {
  1:{label:'Phase 1: Foundation', cal:1500, protein:180},
  2:{label:'Phase 2: The Grind', cal:1700, protein:160},
  3:{label:'Phase 3: The Reveal', cal:1800, protein:150},
};
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const W = {
  Monday:    ['Chest + Front Delts', ['Incline DB Press,4x8-10','Flat DB Press,3x10-12','Cable Flys,3x12-15','DB Front Raise,3x12','Pushups,3xfailure']],
  Tuesday:   ['Back + Rear Delts', ['Pull-ups / Lat Pulldown,4x8-10','Barbell Rows,3x10-12','Seated Cable Rows,3x12','Face Pulls,3x15','Dead Hangs,3x30s']],
  Wednesday: ['Side Delts + Traps', ['DB Lateral Raises,5x15-20','Cable Lateral Raises,4x12-15','Upright Rows,3x12','DB Shrugs,3x15-20','Lateral Raise Dropset,2xfailure']],
  Thursday:  ['Arms + Abs', ['Skull Crushers,3x10-12','Tricep Pushdown,3x12-15','Barbell Curls,4x8-10','Hammer Curls,3x10-12','Hanging Leg Raises,3x12-15','Crunches,3x20','Plank,3x45s']],
  Friday:    ['Legs', ['Squat / Leg Press,4x8-10','RDL,3x10-12','Walking Lunges,3x12/leg','Standing Calf Raises,4x15-20','Seated Calf Raises,3x15']],
  Saturday:  ['Full Body Pump', ['Lateral Raises,3x15','Incline DB Press,3x12','Pull-ups,3x8','Curls,3x12','Tricep Pushdown,3x12','Leg Raises,3x15']],
};
const R = {
  breakfast:[
    {n:'Egg White Bhurji',t:'10 min',c:180,p:22,i:'4 egg whites,1 whole egg,1/2 onion,1 tomato,green chilli,turmeric,salt,pepper',s:'Heat pan with 1 tsp oil|Saute onions till golden|Add tomatoes + spices, cook 2 min|Pour beaten eggs, scramble medium|Top with coriander',tip:'Add mushrooms or capsicum for volume'},
    {n:'Oats + Whey Porridge',t:'5 min',c:350,p:30,i:'40g oats,1 scoop whey,200ml water,1/2 apple,cinnamon',s:'Cook oats in water 3 min|Remove from heat, stir in whey|Top with apple + cinnamon',tip:'Chocolate whey makes this a dessert'},
    {n:'Boiled Eggs + Salad',t:'10 min',c:280,p:25,i:'4 boiled eggs,cucumber,tomato,onion,lemon,salt,pepper,chaat masala',s:'Boil eggs 7 min, cool, peel|Chop veggies into salad|Squeeze lemon, add spices',tip:'Prep eggs night before. Grab + go.'},
    {n:'Veggie Egg Scramble',t:'8 min',c:300,p:28,i:'4 egg whites + 1 whole egg,bell peppers,spinach,onion,garlic,salt,pepper',s:'Saute garlic + onion in 1 tsp oil|Add bell peppers 2 min|Add spinach until wilted|Pour eggs, scramble',tip:'Frozen mixed veggies = cheaper + no prep'}
  ],
  lunch:[
    {n:'Basic Chicken + Rice',t:'25 min',c:480,p:48,i:'150g chicken breast,1/2 cup rice,sabzi,salt,pepper,garlic,lemon',s:'Marinate chicken with salt+pepper+garlic+lemon 10 min|Cook rice 12 min|Grill chicken 5 min each side|Serve with rice + sabzi + salad',tip:'Cook 3 days of chicken at once'},
    {n:'Soya Chunks Curry',t:'20 min',c:350,p:48,i:'80g soya chunks dry,1 onion,2 tomatoes,garlic,ginger,jeera,haldi,dhaniya,salt',s:'Soak soya in hot water 10 min, squeeze dry|Saute onion+garlic+ginger in 1 tsp oil|Add tomato+spices, cook 5 min|Add soya + water, simmer 8 min',tip:'Cheapest protein in India. Rs 150/kg for 520g protein!'},
    {n:'Hostel Mess Hack',t:'0 min',c:450,p:35,i:'1 roti,double dal,salad,100g curd',s:'Skip rice and aloo sabzi|Take only 1 roti|Take DOUBLE dal|Big salad + curd|No sweets',tip:'Grab 2 boiled eggs if mess has them'},
    {n:'Tandoori Chicken Bowl',t:'30 min',c:420,p:50,i:'150g chicken,2 tbsp curd,tandoori masala,lemon,salt,1/2 cup rice,salad',s:'Mix curd+tandoori masala+salt+lemon|Marinate chicken 15+ min|Grill/bake 15 min|Serve with rice + salad',tip:'Tandoori masala packet: Rs 20, lasts a month'}
  ],
  snack:[
    {n:'Classic Whey Shake',t:'2 min',c:120,p:25,i:'1 scoop whey,300ml water',s:'Add water to shaker|Add 1 scoop whey|Shake 15 sec|Drink',tip:'Chocolate whey + black coffee = mocha. Game changer.'},
    {n:'Curd + Cucumber',t:'2 min',c:80,p:5,i:'100g curd,1 cucumber,salt,pepper,chaat masala',s:'Dice cucumber|Mix with curd|Add spices|Done',tip:'Great for gut health + cooling in Indian summer'},
    {n:'Roasted Makhana',t:'5 min',c:150,p:6,i:'30g makhana,1 tsp ghee,salt,pepper,chaat masala',s:'Heat ghee in pan|Add makhana, roast 4 min low-medium|Add spices while stirring|Cool 2 min',tip:'Beats chips. 150 cal vs 500+ for same volume.'},
    {n:'Fruit + Curd Bowl',t:'3 min',c:160,p:8,i:'1 apple,100g curd,pinch cinnamon',s:'Chop fruit into cubes|Mix with curd|Sprinkle cinnamon|Done',tip:'Skip bananas. Apple, papaya, or berries are best.'}
  ],
  dinner:[
    {n:'Grilled Chicken + Salad',t:'20 min',c:450,p:55,i:'200g chicken breast,salt,pepper,garlic,lemon,salad veggies',s:'Season chicken with salt+pepper+garlic+lemon|Grill 6 min each side|Chop big salad|Dress with lemon+salt',tip:'Make extra at lunch, eat cold at dinner'},
    {n:'4-Egg Omelette + Veggies',t:'10 min',c:380,p:40,i:'4 whole eggs,onion,tomato,green chilli,bell pepper,salt,pepper,1 tsp oil',s:'Beat eggs with salt+pepper|Saute veggies 2 min|Pour eggs over veggies|Cook medium, flip when set|Serve with salad',tip:'You can have all 4 yolks at 102kg. Dont waste them.'},
    {n:'Soya Chunks Stir-Fry',t:'15 min',c:320,p:45,i:'80g soya chunks dry,1 onion,capsicum,garlic,soya sauce,chilli,salt,pepper',s:'Rehydrate soya 10 min, squeeze dry|Stir-fry garlic+onion 2 min|Add capsicum+soya|Add soya sauce+spices|High heat 3 min',tip:'Indian chow mein without noodles. Filling + protein bomb.'},
    {n:'Fish Tikka + Salad',t:'25 min',c:380,p:50,i:'200g fish,2 tbsp curd,tikka masala,lemon,salt,salad',s:'Mix curd+tikka masala+lemon+salt|Coat fish, rest 15 min|Grill/bake 12 min|Serve with lemon+salad',tip:'Basa is cheapest. Mackerel has omega-3s too.'}
  ]
};

// ═══ STATE ═══
let state = JSON.parse(localStorage.getItem('tState') || '{}');
if(!state.w) state.w = [];
if(!state.water) state.water = 0;
if(!state.waterDate) state.waterDate = '';
if(!state.doneEx) state.doneEx = [];
if(!state.doneMeals) state.doneMeals = [];
if(!state.start) state.start = new Date().toISOString().slice(0,10);
if(!state.notes) state.notes = {};

function tk(){return new Date().toISOString().slice(0,10)}
function dn(){return DAYS[new Date().getDay()]}
function wn(){
  const d = Math.floor((new Date() - new Date(state.start)) / 86400000);
  return Math.max(0, Math.min(23, Math.floor(d/7)));
}
function pn(){return wn() < 8 ? 1 : wn() < 16 ? 2 : 3}
function dayOfPlan(){
  return Math.floor((new Date() - new Date(state.start)) / 86400000);
}
function save(){localStorage.setItem('tState', JSON.stringify(state))}

// ═══ FIND RECIPE ═══
function findR(name){
  for(const cat in R) for(const r of R[cat]) if(r.n === name) return r;
  return null;
}

// ═══ RENDER TODAY ═══
function renderToday(){
  const phase = pn();
  const info = PHASE[phase];
  const dNum = dayOfPlan() + 1;
  document.getElementById('phaseNum').textContent = phase;
  document.getElementById('weekNum').textContent = wn() + 1;
  document.getElementById('dayBadge').textContent = 'Day ' + Math.max(1,dNum);

  const tdy = tk();
  if(state.waterDate !== tdy){state.water=0; state.waterDate=tdy; save()}

  // Stats
  const sorted = [...state.w].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const cur = sorted.length ? sorted[sorted.length-1].v : 102;
  const start = sorted.length ? sorted[0].v : 102;
  const lost = (start - cur).toFixed(1);
  document.getElementById('sStart').textContent = start;
  document.getElementById('sCurrent').textContent = cur;
  document.getElementById('sLost').textContent = lost > 0 ? lost : '0';

  // Meals
  const meals = getTodayMeals(dNum);
  document.getElementById('calTarget').textContent = info.cal;
  let mh = '', totC = 0;
  meals.forEach((m,i)=>{
    const done = state.doneMeals.includes(i+'-'+tdy);
    if(done) totC += m.c;
    const r = findR(m.r);
    mh += `<div class="meal-item${done?' done':''}" onclick="togMeal(${i})">
      <div class="meal-dot"></div>
      <div class="meal-info">
        <div class="name">${m.n}</div>
        <div class="meta">${m.t} &middot; ${m.c} cal &middot; ${m.p}g protein</div>
      </div>
      <div class="meal-check">${done?'&#x2713;':''}</div>
    </div>
    <div class="recipe-wrap${done?' open':''}">
      ${r ? `<h4>${r.n} (${r.t})</h4>
      <ul>${r.s.split('|').map(s=>'<li>'+s+'</li>').join('')}</ul>
      <div class="tip">${r.tip}</div>` : ''}
    </div>`;
  });
  document.getElementById('mealsContainer').innerHTML = mh;
  document.getElementById('calEaten').textContent = totC;

  // Water
  const wc = state.water || 0;
  document.getElementById('waterCount').textContent = wc;
  let wh = '';
  for(let i=0;i<8;i++) wh += `<div class="water-cup${i<wc?' done':''}" onclick="togWater()">${i<wc?'&#x2713;':'&#x2014;'}</div>`;
  document.getElementById('waterGrid').innerHTML = wh;

  // Workout
  const day = dn();
  const w = W[day];
  if(w && day!=='Sunday'){
    let whtml = `<div class="workout-card"><h3>${day} &middot; ${w[0]}</h3>`;
    w[1].forEach((ex,i)=>{
      const key = tdy+'-'+i;
      const done = state.doneEx.includes(key);
      whtml += `<div class="workout-ex${done?' done':''}"><span><span class="ex-name">${ex.split(',')[0]}</span> <span class="ex-reps">${ex.split(',')[1]}</span></span><div class="ex-ck" onclick="togEx(${i})">${done?'&#x2713;':''}</div></div>`;
    });
    whtml += '</div>';
    document.getElementById('todayWorkout').innerHTML = whtml;
  } else {
    document.getElementById('todayWorkout').innerHTML = '<div class="workout-card"><h3>Rest Day</h3><p style="font-size:13px;color:#555;padding:4px 0">Walk 10K steps. Stretch. Recover.</p></div>';
  }
}

function togMeal(i){
  const key = i+'-'+tk();
  const idx = state.doneMeals.indexOf(key);
  if(idx>-1) state.doneMeals.splice(idx,1); else state.doneMeals.push(key);
  save(); renderToday();
}
function togWater(){
  state.water = state.water>=8 ? 0 : state.water+1;
  if(state.water===1) state.waterDate = tk();
  save(); renderToday();
}
function togEx(i){
  const key = tk()+'-'+i;
  const idx = state.doneEx.indexOf(key);
  if(idx>-1) state.doneEx.splice(idx,1); else state.doneEx.push(key);
  save(); renderToday();
}

// ═══ RENDER WORKOUT ═══
function renderWorkout(){
  const day = dn();
  let dh = '';
  ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].forEach(d=>{
    const a = d===day?' active':'';
    const t = d===day?' today':'';
    dh += `<span class="day-pill${a}${t}" onclick="showDay('${d}')">${d.slice(0,3)}</span>`;
  });
  document.getElementById('dayStrip').innerHTML = dh;
  document.getElementById('workoutDayLabel').textContent = day;
  showDay(day);

  // Notes
  const nk = tk();
  document.getElementById('workoutNotes').value = state.notes[nk] || '';
}

function showDay(day){
  const w = W[day];
  if(w){
    const tdy = tk();
    let wh = `<div class="workout-card"><h3>${day} &middot; ${w[0]}</h3>`;
    w[1].forEach((ex,i)=>{
      const key = tdy+'-'+i;
      const done = state.doneEx.includes(key);
      wh += `<div class="workout-ex${done?' done':''}"><span><span class="ex-name">${ex.split(',')[0]}</span> <span class="ex-reps">${ex.split(',')[1]}</span></span><div class="ex-ck" onclick="togExFromTab('${day}',${i})">${done?'&#x2713;':''}</div></div>`;
    });
    wh += '</div>';
    document.getElementById('workoutDetail').innerHTML = wh;
  } else {
    document.getElementById('workoutDetail').innerHTML = '<div class="workout-card"><h3>Rest Day</h3><p style="font-size:13px;color:#555;padding:4px 0">Walk 10K steps. Stretch. Sleep well.</p></div>';
  }
  document.querySelectorAll('#dayStrip .day-pill').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===day.slice(0,3))});
}

function togExFromTab(day,i){
  const key = tk()+'-'+i;
  const idx = state.doneEx.indexOf(key);
  if(idx>-1) state.doneEx.splice(idx,1); else state.doneEx.push(key);
  save(); showDay(day);
}

// Workout notes auto-save
document.addEventListener('input', function(e){
  if(e.target.id === 'workoutNotes'){
    state.notes[tk()] = e.target.value;
    save();
  }
});

// ═══ RENDER PROGRESS ═══
function renderProgress(){
  const sorted = [...state.w].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let wh = sorted.length === 0
    ? '<div class="empty-state">No weights logged yet. Start today.</div>'
    : sorted.slice(0,14).map((w,i)=>{
        const prev = sorted[i+1];
        const d = prev ? (prev.v - w.v).toFixed(1) : null;
        const dh = d ? (d>0 ? `<span class="diff down">-${d}</span>` : `<span class="diff up">+${Math.abs(d)}</span>`) : '';
        return `<div class="entry-row"><span class="d">${w.date}</span><span class="v">${w.v} kg ${dh}</span></div>`;
      }).join('');
  document.getElementById('weightLog').innerHTML = wh;
}

function logWeight(){
  const val = parseFloat(document.getElementById('weightInput').value);
  if(!val || val<40 || val>200) return;
  state.w.push({date: tk(), v: val});
  state.w.sort((a,b)=>new Date(a.date)-new Date(b.date));
  document.getElementById('weightInput').value = '';
  save(); renderProgress(); renderToday();
}

// ═══ RENDER RECIPES ═══
function renderRecipes(filter){
  let html = '';
  for(const cat in R){
    if(filter !== 'all' && filter !== cat) continue;
    const lbl = cat.charAt(0).toUpperCase() + cat.slice(1);
    html += `<div class="section-title" style="margin-top:16px"><h2>${lbl}</h2></div>`;
    R[cat].forEach(r=>{
      html += `<div class="r-card" onclick="this.classList.toggle('open')">
        <div class="top">
          <div>
            <h4>${r.n}</h4>
            <div class="tags">
              <span class="tag">${r.c} cal</span>
              <span class="tag">${r.p}g protein</span>
              <span class="tag">${r.t}</span>
            </div>
          </div>
          <span class="arrow">+</span>
        </div>
        <div class="detail">
          <h5>Ingredients</h5>
          <ul>${r.i.split(',').map(i=>'<li>'+i.trim()+'</li>').join('')}</ul>
          <h5 style="margin-top:10px">Steps</h5>
          <ul>${r.s.split('|').map(s=>'<li>'+s+'</li>').join('')}</ul>
          <div class="tip">${r.tip}</div>
        </div>
      </div>`;
    });
  }
  document.getElementById('recipeList').innerHTML = html;
}

// ═══ TABS ═══
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    this.classList.add('active');
    const id = 'pane-'+this.dataset.tab;
    document.getElementById(id).classList.add('active');
    if(this.dataset.tab==='workout') renderWorkout();
    if(this.dataset.tab==='progress') renderProgress();
    if(this.dataset.tab==='recipes') renderRecipes(document.querySelector('#recipeFilter .flt.active')?.dataset?.f||'all');
  });
});

// Recipe filters
document.addEventListener('click', function(e){
  const flt = e.target.closest('#recipeFilter .flt');
  if(flt){
    document.querySelectorAll('#recipeFilter .flt').forEach(f=>f.classList.remove('active'));
    flt.classList.add('active');
    renderRecipes(flt.dataset.f);
  }
});

// ═══ INIT ═══
renderToday();
console.log('24-Week Transformation loaded');
</script>
